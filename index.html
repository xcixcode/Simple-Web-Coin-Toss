<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple-Web-Coin-Toss</title>
    <style>
        :root {
            --bg-color: #fdfaf1; 
            --coin-size: 170px;
            --gray-blur: rgba(100, 100, 100, 0.6);
            --arcade-red: #e74c3c;
            --arcade-dark: #c0392b;
        }
        @media (max-width: 480px) { :root { --coin-size: 140px; } }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; position: fixed; background-color: var(--bg-color); }
        body { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Pretendard', sans-serif; perspective: 2500px; }

        #viewport { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; position: relative; }
        #coin { width: var(--coin-size); height: var(--coin-size); position: relative; transform-style: preserve-3d; }
        #coin.blurring .side { filter: blur(25px); background: var(--gray-blur) !important; border: none; }
        
        .side { 
            width: 100%; height: 100%; border-radius: 50%; position: absolute; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15), 0 10px 25px rgba(0,0,0,0.12); 
            border: 6px solid rgba(255,255,255,0.45); 
        }
        .heads { background: linear-gradient(135deg, #f1c40f, #d4ac0d); }
        .tails { background: linear-gradient(135deg, #bdc3c7, #95a5a6); transform: rotateY(180deg); }
        svg { width: 55%; height: 55%; fill: white; }
        #shadow { position: absolute; bottom: 20%; width: 160px; height: 40px; background: rgba(0,0,0,0.08); border-radius: 50%; filter: blur(15px); transform: rotateX(90deg); }

        .ui { width: 100%; padding-bottom: max(50px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .gauge-container { width: 180px; height: 14px; background: #e0e0e0; border-radius: 20px; margin-bottom: 20px; overflow: hidden; opacity: 0; transition: opacity 0.2s; border: 3px solid #fff; }
        #gauge { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db 0%, #e74c3c 100%); }
        #resultText { font-size: 1.5rem; font-weight: 800; color: #5d5b54; margin-bottom: 20px; min-height: 1.6em; opacity: 0; transition: 0.4s; }
        
        .arcade-button {
            position: relative; width: 180px; height: 70px;
            background: #962d22; border-radius: 40px;
            cursor: pointer; border: none; outline: none;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }
        .arcade-button-top {
            position: absolute; top: -10px; left: 0; width: 100%; height: 100%;
            background: var(--arcade-red); border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.3rem; font-weight: 900;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.3), 0 8px 0 #962d22;
            transition: all 0.05s ease;
        }

        .arcade-button.pressed { transform: translateY(4px); }
        .arcade-button.pressed .arcade-button-top { 
            top: -4px; 
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), 0 4px 0 #962d22; 
        }

        .arcade-button:disabled { filter: grayscale(0.8); cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="coin">
            <div class="side heads"><svg viewBox="0 0 24 24"><path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13z M11,2v2 c0,0.55,0.45,1,1,1s1-0.45,1-1V2c0-0.55-0.45-1-1-1S11,1.45,11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2c0-0.55-0.45-1-1-1 S11,19.45,11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0 s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/></svg></div>
            <div class="side tails"><svg viewBox="0 0 24 24"><path d="M12.12,2.05C9.34,2.1,6.81,3.48,5.2,5.71c-0.3,0.42-0.08,1,0.44,1.1c2.14,0.4,3.75,2.27,3.75,4.49s-1.61,4.09-3.75,4.49 c-0.52,0.1-0.74,0.68-0.44,1.1c1.61,2.23,4.14,3.61,6.92,3.66c4.68,0.08,8.54-3.7,8.72-8.38C20.99,6.29,17,2.2,12.12,2.05z"/></svg></div>
        </div>
        <div id="shadow"></div>
    </div>

    <div class="ui">
        <div id="resultText"></div>
        <div class="gauge-container" id="gCont"><div id="gauge"></div></div>
        <button class="arcade-button" id="tossBtn">
            <span class="arcade-button-top">동전 던지기</span>
        </button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playRealisticCoinSound(action) {
            const now = audioCtx.currentTime;
            if (action === 'toss') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(now + 0.15);
            } else {
                [800, 1100, 1500].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2 + (i * 0.05));
                    osc.connect(gain).connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.4);
                });
            }
        }

        let isTossing = false, pressInterval = null, power = 0, direction = 1;
        let isLandingPhase = false; // 현재 낙하 중인지 확인하는 플래그
        const btn = document.getElementById('tossBtn'), gauge = document.getElementById('gauge'), gCont = document.getElementById('gCont');
        const coin = document.getElementById('coin');

        // 모션 감지 이벤트 리스너 추가
        coin.addEventListener('transitionend', (e) => {
            // transform 속성의 애니메이션이 끝났고, 낙하 단계일 때만 소리 재생
            if (e.propertyName === 'transform' && isLandingPhase) {
                playRealisticCoinSound('drop');
                isLandingPhase = false; // 플래그 초기화
                
                // 결과 노출 시퀀스
                setTimeout(() => {
                    coin.classList.remove('blurring');
                    const res = document.getElementById('resultText');
                    setTimeout(() => {
                        res.style.opacity = "1";
                        btn.disabled = false;
                        isTossing = false;
                    }, 300);
                }, 100);
            }
        });

        function startPress(e) {
            if (isTossing || pressInterval) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            btn.classList.add('pressed');
            power = 0; direction = 1; gCont.style.opacity = '1';
            pressInterval = setInterval(() => {
                power += (3.8 * direction); 
                if (power >= 100) { power = 100; direction = -1; }
                else if (power <= 0) { power = 0; direction = 1; }
                gauge.style.width = power + '%';
            }, 16);
        }

        function forceToss() {
            if (isTossing || !pressInterval) return;
            clearInterval(pressInterval); pressInterval = null;
            btn.classList.remove('pressed');
            gCont.style.opacity = '0'; tossCoin(power);
        }

        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('mouseleave', forceToss);
        btn.addEventListener('mouseup', forceToss);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); forceToss(); });

        function tossCoin(p) {
            isTossing = true; btn.disabled = true;
            const res = document.getElementById('resultText');
            res.style.opacity = "0"; coin.classList.add('blurring');
            
            playRealisticCoinSound('toss');

            const isHeads = Math.random() < 0.5;
            const tossHeight = 150 + (p * 4.5); 
            const finalRotation = 1440 + (Math.floor(p / 15) * 360) + (isHeads ? 0 : 180);
            const randomX = (Math.random() - 0.5) * 200;

            // 1단계: 상승 (이동 시간 1초)
            coin.style.transition = "transform 1.0s cubic-bezier(0.2, 0.6, 0.3, 1)";
            coin.style.transform = `translateY(-${tossHeight}px) translateX(${randomX}px) rotateY(${finalRotation/2}deg) rotateX(${finalRotation/4}deg) scale(0.7)`;
            
            // 2단계: 낙하 준비 (1초 뒤에 실행)
            setTimeout(() => {
                isLandingPhase = true; // 낙하 시작 플래그 활성
                res.innerText = isHeads ? `POWER ${Math.round(p)}% : 태양` : `POWER ${Math.round(p)}% : 초승달`;
                
                coin.style.transition = "transform 0.7s cubic-bezier(0.5, 0, 0.5, 1.25)";
                coin.style.transform = `translateY(0) translateX(0) rotateY(${finalRotation}deg) rotateX(0) scale(1)`;
            }, 1000);
        }
    </script>
</body>
</html>
